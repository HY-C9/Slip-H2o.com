<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Slip H2o</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="assets/image/logo/logoSlipH2o.png" type="image/png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #09090b;
            font-family: 'Kanit', sans-serif; 
        }

        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            position: relative;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 1;
            animation: pulse 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shape-1 { 
            width: 400px; height: 400px; 
            background: radial-gradient(circle, #f43f5e 0%, #9333ea 100%); 
            top: -10%; left: -10%; 
            opacity: 0.6;
        }
        .shape-2 { 
            width: 500px; height: 500px; 
            background: radial-gradient(circle, #0ea5e9 0%, #3b82f6 100%); 
            bottom: -15%; right: -10%; 
            opacity: 0.5;
            animation-delay: -5s;
        }
        .shape-3 { 
            width: 300px; height: 300px; 
            background: radial-gradient(circle, #10b981 0%, #059669 100%); 
            top: 40%; left: 40%; 
            opacity: 0.3;
            animation-delay: -2s;
        }

        @keyframes pulse {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.4; }
            50% { transform: scale(1.1) translate(50px, 50px); opacity: 0.7; }
            100% { transform: scale(0.9) translate(-20px, -30px); opacity: 0.5; }
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            z-index: 11;
            margin-bottom: -75px;
        }
        
        .logo-anim {
            width: 150px; 
            height: auto;
            border-radius: 24px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.5));
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 6rem 2.5rem 3rem 2.5rem; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1); 
            width: 380px; 
            border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            text-align: center;
            box-sizing: border-box;
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 30px; 
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.2);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .input-group input { 
            width: 100%; 
            padding: 16px 15px 16px 50px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            background: rgba(0, 0, 0, 0.2); 
            color: white; 
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .input-group input:focus + i,
        .input-group input:not(:placeholder-shown) + i {
            color: #10b981;
        }

        .input-group input::placeholder { color: rgba(255, 255, 255, 0.4); font-weight: 300; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 600; 
            color: white; 
            font-family: 'Kanit', sans-serif;
            font-size: 1.15rem; 
            margin-top: 15px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        button:hover { 
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.6);
        }

        button:active { 
            transform: translateY(1px); 
            box-shadow: 0 5px 10px -5px rgba(16, 185, 129, 0.4);
        }

        #status-msg { 
            margin-top: 25px; 
            text-align: center; 
            font-size: 0.95rem; 
            padding: 14px; 
            border-radius: 12px; 
            display: none; 
            font-weight: 500;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading { 
            background: rgba(245, 158, 11, 0.15); 
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3); 
            display: block !important; 
        }

        .error { 
            background: rgba(239, 68, 68, 0.15); 
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3); 
            display: block !important; 
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-wrapper">
        <div class="logo-box">
            <img src="assets/image/logo/logoSlipH2o.png" alt="Slip H2O" class="logo-anim">
        </div>
        
        <div class="login-card">
            <h2>เข้าสู่ระบบ</h2>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="อีเมล (Email)" required>
                <i class="bi bi-envelope-fill"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="รหัสผ่าน (Password)" required>
                <i class="bi bi-lock-fill"></i>
            </div>

            <button id="loginBtn" onclick="handleLogin()"><i class="bi bi-box-arrow-in-right me-2"></i> เข้าสู่ระบบ</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <script type="module">
        import { auth, dbFirestore } from "./js/firebase-config.js"; 
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // กดปุ่ม Enter เพื่อ Login
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                window.handleLogin();
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('status-msg');

            if(!email || !password) {
                statusMsg.className = 'error';
                statusMsg.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> กรุณากรอกอีเมลและรหัสผ่านให้ครบ';
                return;
            }

            statusMsg.className = 'loading'; 
            statusMsg.innerHTML = '<i class="bi bi-hourglass-split"></i> กำลังตรวจสอบข้อมูล...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                const userRef = doc(dbFirestore, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const now = new Date();
                    const expiry = (data.expiredAt && typeof data.expiredAt.toDate === 'function') 
                                   ? data.expiredAt.toDate() 
                                   : new Date(data.expiredAt);
                
                    if (data.status !== 'active') throw new Error("บัญชีถูกระงับการใช้งาน");
                    if (now > expiry) throw new Error("บัญชีหมดอายุ โปรดติดต่อผู้ดูแลระบบ");
                    
                    const sessionId = Date.now().toString() + Math.random().toString(36).substring(2);
                    localStorage.setItem('currentSessionId', sessionId);
                    await updateDoc(userRef, { currentSessionId: sessionId });
                
                    statusMsg.className = 'loading'; 
                    statusMsg.style.color = '#34d399';
                    statusMsg.style.borderColor = '#10b981';
                    statusMsg.style.backgroundColor = 'rgba(16, 185, 129, 0.15)';
                    statusMsg.innerHTML = '<i class="bi bi-check-circle-fill"></i> เข้าสู่ระบบสำเร็จ!';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    
                } else {
                    throw new Error("ไม่พบข้อมูลผู้ใช้งานในระบบฐานข้อมูล");
                }
            } catch (error) {
                statusMsg.className = 'error';
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    statusMsg.innerHTML = '<i class="bi bi-x-circle-fill"></i> อีเมลหรือรหัสผ่านไม่ถูกต้อง';
                } else {
                    statusMsg.innerHTML = `<i class="bi bi-x-circle-fill"></i> ${error.message || "เกิดข้อผิดพลาด"}`;
                }
            }
        };
    </script>
</body>
</html>
